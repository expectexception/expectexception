# ============================================================================
# NGINX Configuration - ExpectException
# Optimized for Large Media Uploads, AI Detection & High Performance
# ============================================================================

# Worker connections optimization (add to main nginx.conf if not present)
# worker_processes auto;
# worker_connections 4096;

# ============================================================================
# Rate Limiting Zones
# ============================================================================
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ============================================================================
# Upstream Backend (enables keepalive connections)
# ============================================================================
upstream djangobackend {
    server 127.0.0.1:8000;
    keepalive 32;  # Keep connections alive for better performance
}

server {
    listen 8080;
    server_name localhost;

    # Hide nginx version
    server_tokens off;

    # ========================================================================
    # GZIP Compression - Major Performance Boost
    # ========================================================================
    
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-font-opentype
        font/opentype
        font/woff
        font/woff2
        image/svg+xml
        image/x-icon;

    # ========================================================================
    # Security Headers
    # ========================================================================
    
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ========================================================================
    # Global Upload & Performance Settings
    # ========================================================================
    
    # Large file uploads (500MB max globally)
    client_max_body_size 500M;
    
    # Optimized buffer sizes for large uploads
    client_body_buffer_size 128M;
    client_header_buffer_size 4k;
    large_client_header_buffers 8 32k;
    
    # Store large uploads in temp file (reduces memory usage)
    client_body_temp_path /tmp/nginx_uploads 1 2;
    client_body_in_file_only off;
    
    # Timeouts
    client_body_timeout 300s;
    client_header_timeout 60s;
    send_timeout 300s;
    keepalive_timeout 75s;
    keepalive_requests 1000;

    # ========================================================================
    # Proxy Defaults (inherited by location blocks)
    # ========================================================================
    
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Connection "";  # Enable keepalive

    # ========================================================================
    # Django Admin
    # ========================================================================
    
    location /admin {
        limit_req zone=api_limit burst=30 nodelay;
        
        proxy_pass http://djangobackend;
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
    }

    # ========================================================================
    # Django Admin Static Files
    # ========================================================================
    
    location /static/admin/ {
        alias /home/rjt/expexcV2/expectexception/staticfiles/admin/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        gzip_static on;
    }

    # ========================================================================
    # Frontend Static Files (React JS, CSS, Fonts)
    # ========================================================================
    
    location /static/ {
        alias /home/rjt/expexcV2/frontendExpExc/build/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        gzip_static on;
        
        # Open file cache for better performance
        open_file_cache max=1000 inactive=20s;
        open_file_cache_valid 30s;
        open_file_cache_min_uses 2;
        open_file_cache_errors on;
    }

    # ========================================================================
    # AI Detector Upload Endpoint - Optimized for Large Images
    # ========================================================================
    
    location /api/ai-detector/analyze {
        # Rate limiting for uploads
        limit_req zone=upload_limit burst=20 nodelay;
        limit_conn conn_limit 10;
        
        proxy_pass http://djangobackend;
        
        # Very large file support (500MB)
        client_max_body_size 500M;
        client_body_buffer_size 256M;
        
        # Extended timeouts for AI processing (15 minutes)
        proxy_read_timeout 900s;
        proxy_connect_timeout 120s;
        proxy_send_timeout 900s;
        
        # Large buffers for image data
        proxy_buffer_size 512k;
        proxy_buffers 16 512k;
        proxy_busy_buffers_size 1m;
        
        # Disable request buffering for streaming uploads
        proxy_request_buffering off;
        
        # Don't limit response size
        proxy_max_temp_file_size 0;
    }

    # ========================================================================
    # AI Detector Status Endpoint - Lightweight polling
    # ========================================================================
    
    location /api/ai-detector/status/ {
        limit_req zone=api_limit burst=100 nodelay;
        
        proxy_pass http://djangobackend;
        
        # Fast response expected
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        
        # Small buffers for status responses
        proxy_buffer_size 8k;
        proxy_buffers 4 8k;
    }

    # ========================================================================
    # AI Detector Health & Model Status
    # ========================================================================
    
    location /api/ai-detector/health {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://djangobackend;
        proxy_read_timeout 10s;
        access_log off;
    }

    location /api/ai-detector/models {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://djangobackend;
        proxy_read_timeout 30s;
    }

    # ========================================================================
    # General Backend API
    # ========================================================================
    
    location /api {
        limit_req zone=api_limit burst=100 nodelay;
        limit_conn conn_limit 50;
        
        proxy_pass http://djangobackend;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard timeouts
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        
        # Buffer settings
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 512k;
        
        # Large uploads for other services
        client_max_body_size 100M;
    }

    # ========================================================================
    # Media Files - Direct Serving (Fast)
    # ========================================================================
    
    location /media/ {
        alias /home/rjt/expexcV2/expectexception/media/;
        
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
        
        # File caching
        open_file_cache max=3000 inactive=30s;
        open_file_cache_valid 60s;
        open_file_cache_min_uses 1;
        
        # Sendfile for efficient file serving
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        
        # Limit concurrent downloads per IP
        limit_conn conn_limit 20;
        
        access_log off;
    }

    # ========================================================================
    # AI Detector Media (analyzed images)
    # ========================================================================
    
    location /media/ai_detector/ {
        alias /home/rjt/expexcV2/expectexception/media/ai_detector/;
        
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
        
        sendfile on;
        tcp_nopush on;
        
        # Higher limit for potentially large analyzed images
        limit_conn conn_limit 30;
    }

    # ========================================================================
    # Frontend - Serve React Build
    # ========================================================================
    
    location / {
        root /home/rjt/expexcV2/frontendExpExc/build;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        limit_conn conn_limit 30;
        
        # Short cache for HTML (enables fast updates)
        add_header Cache-Control "no-cache, must-revalidate";
        
        # SPA routing support
        error_page 404 = /index.html;
    }

    # ========================================================================
    # Health Check Endpoint
    # ========================================================================
    
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ========================================================================
    # Security - Block Dangerous Paths
    # ========================================================================
    
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~* \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist|env|git|gitignore)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Block PHP execution (if any PHP files get uploaded)
    location ~* \.php$ {
        deny all;
    }

    # ========================================================================
    # Error Pages
    # ========================================================================
    
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
    
    error_page 413 @413_json;
    location @413_json {
        default_type application/json;
        return 413 '{"error": "File too large. Maximum upload size is 500MB."}';
    }
    
    error_page 429 @429_json;
    location @429_json {
        default_type application/json;
        return 429 '{"error": "Too many requests. Please slow down."}';
    }
}
