# ============================================================================
# NGINX Configuration - Optimized for Performance & Security
# ============================================================================

# Gzip Compression - reduces bandwidth and improves load times
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/x-javascript
    application/xml
    application/xml+rss
    application/vnd.ms-fontobject
    application/x-font-ttf
    font/opentype
    image/svg+xml
    image/x-icon;

# Rate limiting zones - prevent abuse
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 8080;
    server_name _;

    # Hide nginx version for security
    server_tokens off;

    # ========================================================================
    # Security Headers
    # ========================================================================
    
    # Prevent clickjacking attacks
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Enable XSS filter in browsers
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Referrer policy for privacy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions policy (formerly Feature-Policy)
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Content Security Policy - adjust as needed for your app
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self';" always;

    # ========================================================================
    # Upload & Timeout Settings
    # ========================================================================
    
    # Allow large file uploads (100MB max)
    client_max_body_size 100M;
    
    # Body buffer sizes
    client_body_buffer_size 10M;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;
    
    # Timeouts
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;
    keepalive_timeout 65s;

    # ========================================================================
    # Static Frontend (React Build)
    # ========================================================================
    
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        
        # Connection limit per IP
        limit_conn conn_limit 20;
        
        # Cache static HTML for a short time
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Explicitly prevent serving a web manifest or service worker
    # if they exist from older builds — return 404 and ensure no caching.
    location = /manifest.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        return 404;
    }

    location = /service-worker.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        return 404;
    }

    # ========================================================================
    # Static Assets Caching (JS, CSS, Images)
    # ========================================================================
    
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        
        # Long-term caching for versioned assets
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Security headers for static assets
        add_header X-Content-Type-Options "nosniff" always;
        
        # Disable access logging for static assets (performance)
        access_log off;
    }

    # ========================================================================
    # API Proxy - Django Backend
    # ========================================================================
    
    location /api {
        # Rate limiting - 30 requests/second with burst of 50
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 30;
        
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        
        # Headers for proper request forwarding
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts for long-running requests (AI detection)
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        
        # Buffer settings for large responses
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        # Allow large file uploads
        client_max_body_size 100M;
        
        # Disable buffering for streaming responses
        proxy_buffering off;
    }

    # ========================================================================
    # Upload-specific endpoint with stricter rate limiting
    # ========================================================================
    
    location /api/ai-detector/analyze {
        # Stricter rate limiting for uploads - 5 requests/second
        limit_req zone=upload_limit burst=10 nodelay;
        limit_conn conn_limit 5;
        
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Extended timeout for AI processing
        proxy_read_timeout 600s;
        proxy_connect_timeout 120s;
        proxy_send_timeout 600s;
        
        # Large buffer for image uploads
        client_max_body_size 100M;
        client_body_buffer_size 50M;
        
        proxy_buffer_size 256k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 512k;
    }

    # ========================================================================
    # Django Admin
    # ========================================================================
    
    location /admin {
        # Stricter rate limiting for admin
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
    }
    
    # ========================================================================
    # Static & Media Files from Backend
    # ========================================================================
    
    location /static/ {
        proxy_pass http://web:8000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache static files
        expires 7d;
        add_header Cache-Control "public";
    }
   
    location /media/ {
        proxy_pass http://web:8000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache media files
        expires 30d;
        add_header Cache-Control "public";
        
        # Security headers for user-uploaded content
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ========================================================================
    # Health Check Endpoint
    # ========================================================================
    
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ========================================================================
    # Block Common Attack Patterns
    # ========================================================================
    
    # Block access to hidden files (except .well-known)
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Block access to backup and sensitive files
    location ~* \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Block common exploit paths
    location ~* (eval\(|base64_decode|gzinflate\(|str_rot13|rot13) {
        deny all;
    }

    # ========================================================================
    # Error Pages
    # ========================================================================
    
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
    
    error_page 429 /429.html;
    location = /429.html {
        root /usr/share/nginx/html;
        internal;
        default_type text/html;
        return 429 '<!DOCTYPE html><html><head><title>Too Many Requests</title></head><body><h1>429 Too Many Requests</h1><p>You have made too many requests. Please wait and try again.</p></body></html>';
    }
}

# -----------------------------------------------------------------------------
# Subdomain for YouTube downloader (example: yt.example.com)
# Replace 'yt.example.com' with your actual subdomain and point DNS A/CNAME to this server.
# This server block serves the same frontend build but redirects the root to the
# in-app route for the YouTube downloader. It also proxies API requests to the
# Django backend so the downloader continues to function.
# -----------------------------------------------------------------------------
server {
    listen 8080;
    server_name yt.example.com;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect bare host to the downloader route so users land on the tool directly.
    location = / {
        return 302 /services/yt-downloader;
    }

    # Serve SPA files, letting the client router handle in-app routes.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Proxy API calls to Django backend (same settings as main server)
    location /api {
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        client_max_body_size 100M;
        proxy_buffering off;
    }

    # Prevent clients loading old manifest/service worker from previous builds
    location = /manifest.json { return 404; }
    location = /service-worker.js { return 404; }

}
