  <div id="root"></div>

  <!-- Beautiful Loading Screen -->
  <div id="app-loading" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #050505;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 99999;
    transition: opacity 0.5s ease-out;
  ">
    <div style="text-align: center;">
      <!-- Logo: inline animated SVG (brackets + blinking cursor), no image request -->
      <svg width="110" height="110" viewBox="0 0 100 100" fill="none" style="margin-bottom: 24px; overflow: visible;">
        <circle cx="50" cy="50" r="46" stroke="rgba(61,252,85,0.2)" stroke-width="2" style="transform-origin: 50px 50px; animation: brandRingBreathe 3s ease-in-out infinite;" />
        <path d="M 40 26 L 15 50 L 40 74" stroke="#3dfc55" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="100" style="stroke-dashoffset: 100; animation: brandDrawIn 0.7s ease-out forwards;" />
        <path d="M 60 26 L 85 50 L 60 74" stroke="#00e5ff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="100" style="stroke-dashoffset: 100; animation: brandDrawIn 0.7s ease-out 0.1s forwards;" />
        <rect x="46" y="32" width="8" height="36" rx="4" fill="#3dfc55" style="filter: drop-shadow(0 0 4px #3dfc55); animation: brandCursorBlink 1.1s ease-in-out infinite;" />
      </svg>

        color: #ffffff;
        font-family: 'Outfit', sans-serif;

        animation: fadeIn 0.8s ease-out;

        Expect<span style="color: #3dfc55;">Exception</span>
      </h1>

        color: #94a3b8;
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        font-weight: 500;
        margin: 0 0 32px;
        letter-spacing: 0.5px;
        animation: fadeIn 1.2s ease-out;
      ">
        Free Developer Services & Blogs
      </p>

      <!-- Loading Spinner -->
      <div style="
        width: 36px;
        height: 36px;
        border: 3px solid rgba(61, 252, 85, 0.08);
        border-top-color: #3dfc55;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto;
        box-shadow: 0 0 15px rgba(61, 252, 85, 0.15);
      "></div>
    </div>
  </div>

  <!-- CSS Animations -->
  <style>
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.05);
      }
    }

    @keyframes brandRingBreathe {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.04); opacity: 0.9; }
    }

    @keyframes brandDrawIn {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }

    @keyframes brandCursorBlink {
      0%, 50% { opacity: 1; }
      55%, 100% { opacity: 0; }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Hide loading screen when app loads */
    #root:not(:empty)~#app-loading {
      opacity: 0;
      pointer-events: none;
    }
  </style>

  <script>
    // Remove loading screen after React mounts
    window.addEventListener('load', function () {
      var loader = document.getElementById('app-loading');
      if (loader) {
        // Use requestAnimationFrame to avoid layout thrashing during initial render
        requestAnimationFrame(function () {
          loader.style.opacity = '0';
          setTimeout(function () {
            loader.style.display = 'none';
          }, 500);
        });
      }
    });
  </script>
