<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>

  <!-- Beautiful Loading Screen -->
  <div id="app-loading" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #0047AB 0%, #0056D6 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 99999;
    transition: opacity 0.5s ease-out;
  ">
    <div style="text-align: center;">
      <!-- Logo -->
      <img src="%PUBLIC_URL%/logo192.png" alt="ExpectException" style="
          width: 120px;
          height: 120px;
          border-radius: 24px;
          box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
          animation: pulse 2s ease-in-out infinite;
          margin-bottom: 32px;
        " />

      <!-- App Name -->
      <h1 style="
        color: white;
        font-family: 'Outfit', sans-serif;
        font-size: 32px;
        font-weight: 700;
        margin: 0 0 8px;
        animation: fadeIn 1s ease-out;
      ">
        ExpExc
      </h1>

      <!-- Tagline -->
      <p style="
        color: rgba(255, 255, 255, 0.9);
        font-family: 'Inter', sans-serif;
        font-size: 16px;
        font-weight: 400;
        margin: 0 0 40px;
        animation: fadeIn 1.5s ease-out;
      ">
        Free Developer Services & Blogs
      </p>

      <!-- Loading Spinner -->
      <div style="
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto;
      "></div>
    </div>
  </div>

  <!-- CSS Animations -->
  <style>
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.05);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Hide loading screen when app loads */
    #root:not(:empty)~#app-loading {
      opacity: 0;
      pointer-events: none;
    }
  </style>

  <script>
    // Remove loading screen after React mounts
    window.addEventListener('load', function () {
      var loader = document.getElementById('app-loading');
      if (loader) {
        // Use requestAnimationFrame to avoid layout thrashing during initial render
        requestAnimationFrame(function () {
          loader.style.opacity = '0';
          setTimeout(function () {
            loader.style.display = 'none';
          }, 500);
        });
      }
    });
  </script>
