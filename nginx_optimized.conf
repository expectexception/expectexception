# NGINX Configuration - ExpectException  
# Optimized for PWA, Large Media Uploads, AI Detection & High Performance
# ============================================================================

# ============================================================================
# Rate Limiting Zones
# ============================================================================
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ============================================================================
# Upstream Backend (enables keepalive connections)
# ============================================================================
upstream djangobackend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ============================================================================
# Main Server Block
# ============================================================================
server {
    listen 80;
    server_name _;
    port_in_redirect off;
    absolute_redirect off;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Common proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # ========================================================================
    # Django Admin
    # ========================================================================
    
    location /admin {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://djangobackend;
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
    }

    # ========================================================================
    # Django Admin Static Files
    # ========================================================================
    
    location /static/admin/ {
        alias /home/rjt/expexcV2/expectexception/staticfiles/admin/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        gzip_static on;
    }

    # ========================================================================
    # Frontend Static Files (React JS, CSS, Fonts) - OPTIMIZED
    # ========================================================================
    
    location /static/ {
        alias /home/rjt/expexcV2/frontendExpExc/build/static/;
        
        # Maximum cache for hashed files
        expires max;
        add_header Cache-Control "public, immutable";
        access_log off;
        gzip_static on;
        
        # Optimized file cache
        open_file_cache max=5000 inactive=60s;
        open_file_cache_valid 120s;
        open_file_cache_min_uses 1;
        open_file_cache_errors on;
        
        # CORS for fonts
        location ~* \.(woff|woff2|ttf|eot)$ {
            add_header Access-Control-Allow-Origin "*";
            expires max;
        }
    }

    # ========================================================================
    # PWA Support - Service Worker (CRITICAL - NO CACHE)
    # ========================================================================
    
    location = /service-worker.js {
        root /home/rjt/expexcV2/frontendExpExc/build;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Service-Worker-Allowed "/";
        expires off;
        access_log off;
    }

    # ========================================================================
    # PWA Manifest
    # ========================================================================
    
    location = /manifest.json {
        root /home/rjt/expexcV2/frontendExpExc/build;
        add_header Cache-Control "public, max-age=3600";
        add_header Content-Type "application/manifest+json";
    }

    # ========================================================================
    # PWA Icons - Long Cache
    # ========================================================================
    
    location ~* ^/(logo|icon|apple-touch-icon|favicon).*\.(png|ico|svg)$ {
        root /home/rjt/expexcV2/frontendExpExc/build;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ========================================================================
    # Blog Image Upload - OPTIMIZED
    # ========================================================================
    
    location = /api/blog/upload-image/ {
        limit_req zone=upload_limit burst=10 nodelay;
        limit_conn conn_limit 5;
        
        proxy_pass http://djangobackend;
        
        # 10MB limit for blog images
        client_max_body_size 10M;
        client_body_buffer_size 2M;
        
        # Reasonable timeouts for images
        proxy_read_timeout 60s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        
        # Efficient buffering
        proxy_buffer_size 64k;
        proxy_buffers 8 64k;
        proxy_busy_buffers_size 128k;
    }

    # ========================================================================
    # AI Detector Upload Endpoint - Optimized for Large Images
    # ========================================================================
    
    location /api/ai-detector/analyze {
        limit_req zone=upload_limit burst=20 nodelay;
        limit_conn conn_limit 10;
        
        proxy_pass http://djangobackend;
        
        # Very large file support (500MB)
        client_max_body_size 500M;
        client_body_buffer_size 256M;
        
        # Extended timeouts for AI processing (15 minutes)
        proxy_read_timeout 900s;
        proxy_connect_timeout 120s;
        proxy_send_timeout 900s;
        
        # Large buffers for image data
        proxy_buffer_size 512k;
        proxy_buffers 16 512k;
        proxy_busy_buffers_size 1m;
        
        # Disable request buffering for streaming uploads
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
    }

    # ========================================================================
    # AI Detector Status Endpoint - Lightweight polling
    # ========================================================================
    
    location /api/ai-detector/status/ {
        limit_req zone=api_limit burst=100 nodelay;
        proxy_pass http://djangobackend;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_buffer_size 8k;
        proxy_buffers 4 8k;
    }

    # ========================================================================
    # AI Detector Health & Model Status
    # ========================================================================
    
    location /api/ai-detector/health {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://djangobackend;
        proxy_read_timeout 10s;
        access_log off;
    }

    location /api/ai-detector/models {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://djangobackend;
        proxy_read_timeout 30s;
    }

    # ========================================================================
    # General Backend API
    # ========================================================================
    
    location /api {
        limit_req zone=api_limit burst=100 nodelay;
        limit_conn conn_limit 50;
        
        proxy_pass http://djangobackend;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard timeouts
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        
        # Buffer settings
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 512k;
        
        # Large uploads for other services
        client_max_body_size 100M;
    }

    # ========================================================================
    # Media Files - Direct Serving
    # ========================================================================
    
    location /media/ {
        alias /home/rjt/expexcV2/expectexception/media/;
        
        expires 30d;
        add_header Cache-Control "public";
        
        # File caching
        open_file_cache max=3000 inactive=30s;
        open_file_cache_valid 60s;
        open_file_cache_min_uses 1;
        
        # Efficient file serving
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        
        # Limit concurrent downloads per IP
        limit_conn conn_limit 20;
        access_log off;
    }

    # ========================================================================
    # AI Detector Media
    # ========================================================================
    
    location /media/ai_detector/ {
        alias /home/rjt/expexcV2/expectexception/media/ai_detector/;
        expires 7d;
        add_header Cache-Control "public";
        sendfile on;
        tcp_nopush on;
        limit_conn conn_limit 30;
    }

    # ========================================================================
    # Frontend - Serve React Build with PWA Support
    # ========================================================================
    
    location / {
        root /home/rjt/expexcV2/frontendExpExc/build;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        limit_conn conn_limit 30;
        
        # Short cache for HTML (enables fast updates)
        add_header Cache-Control "no-cache, must-revalidate";
        
        # Enhanced security headers
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # SPA routing support
        error_page 404 = /index.html;
    }

    # ========================================================================
    # Health Check Endpoint
    # ========================================================================
    
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ========================================================================
    # Security - Block Dangerous Paths
    # ========================================================================
    
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~* \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist|env|git|gitignore)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~* \.php$ {
        deny all;
    }

    # ========================================================================
    # Error Pages
    # ========================================================================
    
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
    
    error_page 413 @413_json;
    location @413_json {
        default_type application/json;
        return 413 '{"error": "File too large. Maximum upload size is 500MB."}';
    }
    
    error_page 429 @429_json;
    location @429_json {
        default_type application/json;
        return 429 '{"error": "Too many requests. Please slow down."}';
    }
}
